<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1a237e"/>

  <!-- UK flag-inspired cross (stylised) -->
  <path d="M50 10 L50 90 M10 50 L90 50" stroke="#ffffff" stroke-width="12" opacity="0.9"/>
  <path d="M50 10 L50 90 M10 50 L90 50" stroke="#c8102e" stroke-width="6" opacity="0.9"/>

  <!-- Magnifying glass -->
  <circle cx="45" cy="45" r="22" fill="none" stroke="#ffffff" stroke-width="5"/>
  <line x1="62" y1="62" x2="82" y2="82" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>

  <!-- Code brackets inside lens -->
  <text x="38" y="52" font-family="monospace" font-size="18" fill="#4fc3f7" font-weight="bold">&lt;/&gt;</text>
</svg>
